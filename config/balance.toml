# config/balance.toml - game-balance constants (Phase 2 content set).
#
# These are tunable game-design values: weapons, passives, enemies, evolution,
# the director difficulty curve, leveling, and pickup constants. Unlike
# config/tuning.toml (performance operating point), these are balance dials that
# can be edited without code changes (master plan section 5.5).
#
# config.py loads this file and falls back to code defaults for any missing key,
# so the game still runs if a section or key is absent. Out-of-range values
# (e.g. a negative cooldown) raise a clear ValueError naming the offending key.
#
# Performance operating-point constants live in tuning.toml, not here.
#
# Values below began as Phase 2 estimates; Phase 3 applies a first-pass
# difficulty-curve tune (see the [director] section). They remain data-driven
# dials -- balance is changed by editing this file, never code (proven by
# tests/test_balance_sensitivity.py).

# Leveling: N-pick draft size and the xp curve. xp to clear level L is
# xp_curve_base * xp_curve_growth ** (L - 1).
[leveling]
draft_choices   = 3      # number of cards shown per level-up draft
xp_curve_base   = 5.0    # xp needed to clear level 1
xp_curve_growth = 1.5    # geometric multiplier per level

# Weapons. Each weapon has a level (max_level), an auto-fire cooldown (seconds,
# multiplied by the attack-speed passive), per-shot damage, a projectile count,
# projectile travel speed/lifetime, and a targeting strategy.
#
# targeting strategies:
#   "nearest"           - aim at the nearest enemy (tie-break: lowest id)
#   "nearest_or_random" - aim at the nearest enemy; ties resolved via injected RNG
#   "forward_arc"       - instant hit on enemies inside a forward arc (no projectile)

[weapons.dagger]
max_level        = 8
cooldown         = 1.2
damage           = 6.0
projectile_count = 1
projectile_speed = 14.0
projectile_ttl   = 1.2
targeting        = "nearest"
glyph            = "-"        # fast straight dart
color            = "white"

[weapons.magic_bolt]
max_level        = 8
cooldown         = 1.8
damage           = 9.0
projectile_count = 1
projectile_speed = 10.0
projectile_ttl   = 1.6
targeting        = "nearest_or_random"
glyph            = "*"        # arcane bolt
color            = "cyan"

[weapons.swing]
max_level        = 8
cooldown         = 1.0
damage           = 8.0
projectile_count = 0      # melee: no projectile, resolved as instant hits
projectile_speed = 0.0
projectile_ttl   = 0.0
targeting        = "forward_arc"
arc_range        = 5.0    # world-unit reach of the swing in front of the player
arc_half_width   = 0.3    # cosine half-width: 0 = 180 deg (hemisphere), 1 = 0 deg (ray only), 0.3 ~= 72 deg cone
glyph            = ")"        # melee swing arc (drawn by the swing effect, stage 3)
color            = "red"
effect_ttl       = 0.15       # swing-visual lifetime in seconds (a few ticks)

# Evolution result weapon. Replaces dagger when the evolution applies. max_level
# is 1 (evolved weapons are terminal in Phase 2). It pierces multiple enemies.
[weapons.dagger_evolved]
max_level        = 1
cooldown         = 0.6
damage           = 10.0
projectile_count = 3
projectile_speed = 18.0
projectile_ttl   = 1.2
targeting        = "nearest"
pierce           = 4
glyph            = ">"        # piercing evolved dart (fan of 3, stage 2)
color            = "yellow"
spread_angle     = 30.0       # fan the 3 darts across a 30 deg cone

# Lance: a fast, far-reaching dart that pierces a whole line of enemies. Data-only
# (no new targeting code): "nearest" + high pierce + high speed + long ttl.
[weapons.lance]
max_level        = 8
cooldown         = 1.5
damage           = 14.0
projectile_count = 1
projectile_speed = 26.0    # fast: a long thrown lance
projectile_ttl   = 1.6     # long range
targeting        = "nearest"
pierce           = 99      # passes through a whole line (collision is 1 enemy/tick)
glyph            = "="
color            = "green"

# Evolution result weapon for lance_x. Replaces lance when the evolution applies.
# max_level is 1 (evolved weapons are terminal, like dagger_evolved). It is a
# faster, harder-hitting 3-dart piercing fan and reuses the existing "nearest"
# projectile targeting -- adding it is data-only (no new targeting code).
[weapons.lance_evolved]
max_level        = 1
cooldown         = 0.9
damage           = 22.0
projectile_count = 3
projectile_speed = 30.0
projectile_ttl   = 1.8
targeting        = "nearest"
pierce           = 99
glyph            = "#"
color            = "green"
spread_angle     = 20.0       # fan the 3 darts across a 20 deg cone

# Nova: a 360-degree burst around the player for crowd control (targeting "radial").
[weapons.nova]
max_level        = 8
cooldown         = 2.2
damage           = 7.0
projectile_count = 8       # 8 shots spaced 45 deg apart around the player
projectile_speed = 9.0
projectile_ttl   = 1.0
targeting        = "radial"
glyph            = "o"
color            = "magenta"

# Orbit: a defensive aura of glyphs that revolve around the player (targeting
# "orbit"). ttl-bounded and respawned each cooldown -- the projectile_ttl < cooldown
# relationship is load-bearing (it restores the per-life hit_ids re-hit cadence).
[weapons.orbit]
max_level           = 8
cooldown            = 3.0    # respawn cadence -> the re-hit cadence
damage              = 6.0
projectile_count    = 3      # 3 orbiting glyphs, evenly spaced on the ring
projectile_speed    = 0.0    # orbit uses angular speed, not linear velocity
projectile_ttl      = 2.8    # < cooldown so the ring respawns before it lapses
targeting           = "orbit"
pierce              = 99     # one life sweeps many distinct enemies (hit_ids guards re-hit)
orbit_radius        = 4.0    # ring radius in world units
orbit_angular_speed = 3.0    # revolution speed (radians / second)
glyph               = "O"
color               = "cyan"

# Passives. Each multiplies a single stat per owned level (product over levels).
#   attack_speed -> cooldown multiplier (< 1 makes weapons fire faster)
#   move_speed   -> movement multiplier (> 1 makes the player faster)
#   magnet       -> pickup-range multiplier (> 1 widens the magnet radius)
[passives.attack_speed]
max_level            = 5
multiplier_per_level = 0.92

[passives.move_speed]
max_level            = 5
multiplier_per_level = 1.08

[passives.magnet]
max_level            = 5
multiplier_per_level = 1.25

# Permanent (cross-run) upgrades. Bought with gold between runs, applied read-only
# at run start. `stat` names the effective_stats field multiplied (same ids as the
# passives above); the next level's gold price is cost_base * cost_growth ** level.
[upgrades.swift]              # permanent move-speed boost
max_level            = 5
stat                 = "move_speed"
multiplier_per_level = 1.08
cost_base            = 50
cost_growth          = 1.6

[upgrades.fury]               # permanent attack-speed boost (cooldown < 1)
max_level            = 5
stat                 = "attack_speed"
multiplier_per_level = 0.95
cost_base            = 60
cost_growth          = 1.6

# Enemies. hp / move_speed / spawn_weight drive the director's weighted spawn.
# glyph and color are render hints consumed by sim/render (Chunk 2).
[enemies.walker]              # slow basic chaser (many)
hp           = 10.0
move_speed   = 2.5
spawn_weight = 70.0
glyph        = "z"
color        = "red"

[enemies.swarm]               # fast weak swarm
hp           = 4.0
move_speed   = 5.0
spawn_weight = 30.0
glyph        = "x"
color        = "magenta"

[enemies.brute]               # slow heavy bruiser: rare, high hp, low speed
hp           = 40.0
move_speed   = 1.5
spawn_weight = 8.0
glyph        = "B"
color        = "yellow"

# Evolution rule: dagger at base_max_level + the attack_speed passive owned ->
# the dagger_evolved weapon. Adding evolutions is data-only (no code changes).
[evolution.dagger_x]
base             = "dagger"
requires_passive = "attack_speed"
base_max_level   = 8
result_weapon    = "dagger_evolved"

# Evolution rule: lance at base_max_level + the move_speed passive owned ->
# the lance_evolved weapon. Data-only, mirroring dagger_x (no code changes).
[evolution.lance_x]
base             = "lance"
requires_passive = "move_speed"
base_max_level   = 8
result_weapon    = "lance_evolved"

# Director difficulty curve. Spawn interval shrinks (spawn rate rises) over time;
# reinforce_steps is a per-minute table of [minute, interval_mult, concurrent].
#
# Phase 3 first-pass tune: the reinforce ramp now continues past minute 3 (it
# previously plateaued there) so late-game pressure keeps rising -- concurrency
# climbs to 6 and the interval multiplier keeps shrinking toward the floor. The
# effective interval is base_spawn_interval * interval_mult, clamped at
# min_spawn_interval.
[director]
base_spawn_interval = 2.0
min_spawn_interval  = 0.4
reinforce_steps = [
  [0, 1.0,  1],
  [1, 0.85, 2],
  [2, 0.7,  3],
  [3, 0.55, 4],
  [4, 0.45, 5],
  [5, 0.35, 6],
]

# Pickup: base magnet (xp-gem auto-collect) radius in world units. The magnet
# passive multiplies this base radius.
[pickup]
magnet_range = 4.0

# Meta progression: gold earned per enemy kill. Banked at run end into
# saves/meta.json and spent on permanent upgrades. Run-end gold = kills *
# gold_per_kill.
[meta]
gold_per_kill = 1
