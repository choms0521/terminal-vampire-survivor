[pytest]
# Headless test configuration (Phase 3 Day 1).
#
# Coverage is intentionally NOT applied in addopts. The 80% coverage gate lives
# in selftest.py (the exit-0 self-test entry, which carries --cov-fail-under=80)
# and in the explicit per-module coverage commands documented in the Phase 3
# plan. Keeping the default run coverage-free means a single-file TDD run
# (pytest tests/test_weapons.py) reports only what it exercises and the
# per-module coverage reads stay unambiguous, while the authoritative gate is
# still enforced by `python selftest.py` and the acceptance-criteria commands.
testpaths = tests
addopts = -q
